</head>
<body>
    <form action="">
    <h1>EMAIL VALIDATION</h1><br><br>
    <label for="username">UserName</label><br>
    <input type="email" id="username" name="username" required pattern="^[a-z0-9._%+-]+@(gmail\.com|yahoo\.com)$"><br><br>
    <label for="password">PassWord</label><br>
    <input type="text" id="password" name="password" pattern="(?=.*[a-z])(?=.*[A-Z])(?=.*\d).{8,10}"><br><br>
    <label for="">Submit</label> 
    <input type="submit" value="varify" style="background-color:rgb(100, 91, 163);padding: 4px;border:none;border-radius:5px;cursor:pointer;" formaction="./submit.html">
    </form>
</body>
